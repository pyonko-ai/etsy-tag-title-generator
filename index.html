function buildResult(cat, scene, tool, keyword) {
  var key = cat+"_"+scene;
  var base = DB[key];
  if (!base) {
    var keys = Object.keys(DB);
    var fallback = keys.find(function(k){ return k.indexOf(cat+"_")===0; });
    base = fallback ? DB[fallback] : {t:["Printable Template Digital Download","Editable Template Printable","Digital Printable Bundle"],tags:["printable template","digital download","editable template","instant download","printable bundle","digital template","canva template","printable set","template download","diy printable"],seo:78,comp:"中",vol:"高い",trend:"→安定"};
  }
  var t = TOOLS.find(function(x){ return x.id===tool; }) || TOOLS[0];

  // キーワード処理
  var kwTags = [];
  var kwTitleWord = "";
  if (keyword && keyword.trim()) {
    var kw = keyword.trim();
    Object.keys(KW_MAP).forEach(function(jp){
      if (kw.indexOf(jp)>=0) {
        KW_MAP[jp].forEach(function(en){ if(kwTags.indexOf(en)<0) kwTags.push(en); });
      }
    });
    if (/[a-zA-Z]/.test(kw)) {
      kw.split(/[\s,　]+/).forEach(function(w){
        if(w.length>1 && kwTags.indexOf(w.toLowerCase())<0) kwTags.push(w.toLowerCase());
      });
    }
    kwTitleWord = kwTags.length>0 ? cap(kwTags[0]) : "";
  }

  // タイトル3候補
  var titles = base.t.map(function(tp, i){
    var title = (i===0 && kwTitleWord) ? kwTitleWord+" "+tp : tp;
    title += " "+t.titleWord;
    if(title.length>140) title = title.substring(0,137)+"...";
    return title;
  });

  // タグ13個
  var tags = [];
  kwTags.slice(0,3).forEach(function(x){ if(tags.indexOf(x)<0) tags.push(x); });
  base.tags.forEach(function(x){ if(tags.indexOf(x)<0) tags.push(x); });
  if(tags.indexOf(t.tagWord)<0) tags.push(t.tagWord);
  if(tags.indexOf("digital download")<0) tags.push("digital download");
  if(tags.indexOf("instant download")<0) tags.push("instant download");
  tags = tags.slice(0,13);

  return {titles:titles, tags:tags, seoScore:base.seo, competition:base.comp, searchVol:base.vol, trend:base.trend};
}

function cap(s){ return s ? s.charAt(0).toUpperCase()+s.slice(1) : ""; }

function copyText(text, id) {
  if(navigator.clipboard) navigator.clipboard.writeText(text.replace(/\\n/g,"\n"));
  var el = document.getElementById(id);
  if(!el) return;
  var orig = el.innerHTML;
  el.innerHTML = "✓ コピー済";
  el.style.background="rgba(180,240,200,0.6)"; el.style.color="#208040";
  setTimeout(function(){ el.innerHTML=orig; el.style.background=""; el.style.color=""; },1800);
}

  var h=hd()+'<div class="card" style="animation:fadeUp 0.5s ease both">'+pb(3,4,S.keyword?90:78);
  h+='<p style="font-size:11px;color:#70A080;margin:0 0 3px;font-weight:700;text-transform:uppercase;letter-spacing:1px">スタイル・キーワード（任意）✍️</p>';
  h+='<h2 style="font-size:17px;font-weight:900;color:#204030;margin:0 0 5px">デザインの特徴を入力してね</h2>';
  h+='<p style="font-size:12px;color:#608070;margin:0 0 0.8rem;line-height:1.5">例：コケットリボン、くすみピンク、水彩、ボホ<br><span style="color:#90B0A0">※スキップしてもOK</span></p>';
  h+='<input class="kw-input" id="kw" type="text" placeholder="例：コケットリボン　くすみピンク" value="'+eh(S.keyword)+'" maxlength="60">';
  h+='<div style="display:flex;flex-wrap:wrap;gap:5px;margin-top:9px">';
  hints.forEach(function(hw){ h+='<span class="tag-chip" data-a="hint" data-v="'+hw+'">'+hw+'</span>'; });
  h+='</div>'+nav('b3','gen','✨ 生成する！',false)+'</div>';
  h+='<p style="text-align:center;font-size:11px;color:rgba(80,130,90,0.55);margin:0.8rem 0 0">Etsyトレンドデータ × SEO最適化 🌿</p>';
  return wrap(h);
}

function rResult(){
  var d=S.result;
  var cc=d.competition==="低"?"#3B9E5B":d.competition==="中"?"#C07820":"#C03030";
  var cb=d.competition==="低"?"rgba(180,240,200,0.3)":d.competition==="中"?"rgba(255,220,160,0.3)":"rgba(255,180,180,0.3)";
  var tc=d.trend.indexOf("↑")>=0?"#2A8A2A":"#7070A0";
  var sc=d.seoScore>=90?"#2A8A2A":d.seoScore>=80?"#C07820":"#C03030";
  var vc=d.searchVol==="非常に高い"?"#1060C0":d.searchVol==="高い"?"#2A8A2A":"#9070A0";

  var h=hd()+'<div class="card" style="animation:popIn 0.5s cubic-bezier(0.34,1.56,0.64,1) both">';

  // SEO
  h+='<div style="background:rgba(255,255,255,0.65);border:1px solid rgba(180,220,180,0.5);border-radius:16px;padding:1rem;margin-bottom:0.75rem">'
   +'<p style="font-size:10px;color:#508050;margin:0 0 7px;font-weight:700;text-transform:uppercase;letter-spacing:1px">📊 SEO分析レポート</p>'
   +'<div style="display:flex;justify-content:space-between;margin-bottom:3px"><span style="font-size:11px;color:#606060;font-weight:600">SEOスコア</span><span style="font-size:11px;font-weight:800;color:'+sc+'">'+d.seoScore+'/100</span></div>'
   +'<div style="height:8px;background:rgba(0,0,0,0.08);border-radius:4px;overflow:hidden;margin-bottom:9px"><div style="height:100%;width:'+d.seoScore+'%;background:'+sc+';border-radius:4px"></div></div>'
   +'<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px">'
   +'<div style="background:'+cb+';border-radius:10px;padding:7px 5px;text-align:center"><div style="font-size:9px;color:#808080;margin-bottom:2px;font-weight:600">競合の多さ</div><div style="font-size:13px;font-weight:800;color:'+cc+'">'+eh(d.competition)+'</div></div>'
   +'<div style="background:rgba(180,210,255,0.3);border-radius:10px;padding:7px 5px;text-align:center"><div style="font-size:9px;color:#808080;margin-bottom:2px;font-weight:600">検索ボリューム</div><div style="font-size:11px;font-weight:800;color:'+vc+'">'+eh(d.searchVol)+'</div></div>'
   +'<div style="background:rgba(200,240,200,0.3);border-radius:10px;padding:7px 5px;text-align:center"><div style="font-size:9px;color:#808080;margin-bottom:2px;font-weight:600">トレンド</div><div style="font-size:11px;font-weight:800;color:'+tc+'">'+eh(d.trend)+'</div></div>'
   +'</div>';
  if(d.competition==="高") h+='<div style="margin-top:7px;background:rgba(255,220,180,0.3);border-radius:8px;padding:6px 10px"><p style="font-size:11px;color:#805030;margin:0">⚠️ 競合が多いジャンルです。キーワードで差別化しましょう。</p></div>';
  if(d.competition==="低") h+='<div style="margin-top:7px;background:rgba(180,240,200,0.3);border-radius:8px;padding:6px 10px"><p style="font-size:11px;color:#205830;margin:0">✅ 競合が少なくねらい目！今がチャンスです。</p></div>';
  h+='</div>';

  // タイトル
  h+='<div style="background:rgba(255,255,255,0.65);border:1px solid rgba(180,210,240,0.5);border-radius:16px;padding:1rem;margin-bottom:0.75rem">'
   +'<p style="font-size:10px;color:#4060A0;margin:0 0 7px;font-weight:700;text-transform:uppercase;letter-spacing:1px">📝 タイトル候補（タップでコピー）</p>';
  d.titles.forEach(function(t,i){
    var bid="tc"+i;
    h+='<div onclick="copyText(\''+ej(t)+'\',\''+bid+'\')" style="background:rgba(248,250,255,0.85);border:1px solid rgba(200,215,240,0.5);border-radius:12px;padding:10px 12px;margin-bottom:6px;cursor:pointer" onmouseover="this.style.background=\'rgba(235,242,255,0.95)\'" onmouseout="this.style.background=\'rgba(248,250,255,0.85)\'">'
      +'<div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px">'
      +'<p style="font-size:11px;color:#203060;margin:0;line-height:1.5;font-weight:600;flex:1;word-break:break-all">'+eh(t)+'</p>'
      +'<span id="'+bid+'" style="font-size:10px;color:#A0A0C0;flex-shrink:0;font-weight:700;white-space:nowrap">コピー</span>'
      +'</div>'
      +'<div style="display:flex;gap:4px;margin-top:4px">'
      +'<span style="font-size:9px;background:rgba(180,200,240,0.4);color:#4060A0;padding:1px 7px;border-radius:10px;font-weight:600">'+t.length+'文字</span>'
      +(t.length<=140?'<span style="font-size:9px;background:rgba(180,240,200,0.4);color:#208040;padding:1px 7px;border-radius:10px;font-weight:600">✓ OK</span>':'')
      +'</div></div>';
  });
  h+='</div>';

  // タグ
  var tagsStr=ej(d.tags.join(", "));
  h+='<div style="background:rgba(255,255,255,0.65);border:1px solid rgba(200,180,240,0.5);border-radius:16px;padding:1rem;margin-bottom:0.75rem">'
   +'<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:7px">'
   +'<p style="font-size:10px;color:#6040A0;margin:0;font-weight:700;text-transform:uppercase;letter-spacing:1px">🏷️ Etsyタグ（'+d.tags.length+'/13）</p>'
   +'<button class="copy-btn" id="ctag" onclick="copyText(\''+tagsStr+'\',\'ctag\')" style="background:rgba(200,180,240,0.3);color:#6040A0;font-size:10px;padding:4px 10px">全タグをコピー</button>'
   +'</div><div>';
  d.tags.forEach(function(t,i){
    var tid="t"+i;
    h+='<span class="tag-chip" onclick="copyText(\''+ej(t)+'\',\''+tid+'\')"><span id="'+tid+'">'+eh(t)+'</span></span>';
  });
  h+='</div><p style="font-size:10px;color:#B0A0C0;margin:7px 0 0;text-align:center">個別タグもタップでコピーできます 👆</p></div>';

  // ガイド
  h+='<div style="background:rgba(255,248,235,0.7);border:1px solid rgba(220,180,100,0.4);border-radius:14px;padding:0.75rem;margin-bottom:0.75rem">'
   +'<p style="font-size:10px;color:#806020;margin:0 0 5px;font-weight:700">💡 Etsyへの貼り付け方</p>'
   +'<p style="font-size:11px;color:#705020;margin:0 0 2px;line-height:1.5">① タイトルをタップ → EtsyのTitle欄にペースト</p>'
   +'<p style="font-size:11px;color:#705020;margin:0 0 2px;line-height:1.5">② タグを1つずつタップ → Tags欄に1個ずつ入力</p>'
   +'<p style="font-size:11px;color:#705020;margin:0;line-height:1.5">③「全部コピー」でメモ帳に保存しておくと便利</p>'
   +'</div>';

  var allTxt="【タイトル】\\n"+ej(d.titles[0])+"\\n\\n【タグ】\\n"+tagsStr;
  h+='<button class="copy-btn" id="call" onclick="copyText(\''+allTxt+'\',\'call\')" style="width:100%;background:linear-gradient(135deg,#40A850,#2080A0);color:#fff;font-size:13px;font-weight:800;padding:13px;border-radius:14px;margin-bottom:10px;box-shadow:0 5px 18px rgba(40,120,80,0.3)">📋 タイトル＆タグを全部コピー</button>';
  h+='<button class="btn-back" style="width:100%" id="rst">← 最初からやり直す</button>';
  h+='</div><p style="text-align:center;font-size:11px;color:rgba(80,130,90,0.55);margin:0.8rem 0 0">Etsyトレンドデータ × SEO最適化 🌿</p>';
  return wrap(h);
}

// ============================================================
// render & bind
// ============================================================
function render(){
  var app=document.getElementById("app");
  if(!app) return;
  if(S.result) app.innerHTML=rResult();
  else if(S.step===0) app.innerHTML=r0();
  else if(S.step===1) app.innerHTML=r1();
  else if(S.step===2) app.innerHTML=r2();
  else app.innerHTML=r3();
  bind();
}

function bind(){
  document.querySelectorAll('[data-a]').forEach(function(el){
    el.addEventListener('click',function(){
      var a=this.getAttribute('data-a'), v=this.getAttribute('data-v');
      if(a==='cat')   set({cat:v, scene:'', tool:'', step:0});
      if(a==='scene') set({scene:v});
      if(a==='tool')  set({tool:v});
      if(a==='hint'){
        var cur=document.getElementById('kw');
        var val=(cur?cur.value:S.keyword);
        val=val?(val+' '+v).trim():v;
        S.keyword=val; render();
      }
    });
  });
  var kw=document.getElementById('kw');
  if(kw) kw.addEventListener('input',function(){ S.keyword=this.value; });

  var ids={
    'n0':function(){ if(S.cat) set({step:1}); },
    'n1':function(){ if(S.scene) set({step:2}); },
    'n2':function(){ if(S.tool) set({step:3}); },
    'b1':function(){ set({step:0,scene:'',tool:''}); },
    'b2':function(){ set({step:1,tool:''}); },
    'b3':function(){ set({step:2}); },
    'gen':function(){
      var k=document.getElementById('kw');
      var kv=k?k.value:S.keyword;
      set({keyword:kv, result:buildResult(S.cat,S.scene,S.tool,kv)});
    },
    'rst':function(){ set({step:0,cat:'',scene:'',tool:'',keyword:'',result:null}); },
  };
  Object.keys(ids).forEach(function(id){
    var el=document.getElementById(id);
    if(el) el.addEventListener('click',ids[id]);
  });
}

render();
</script>
</body>
</html>
