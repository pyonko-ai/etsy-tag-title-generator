function buildResult(scene, product, tool, keyword) {
  var key = scene+"_"+product;
  var base = DB[key];
  if (!base) {
    var keys = Object.keys(DB);
    var fb = keys.find(function(k){ return k.indexOf(scene+"_")===0; }) || keys[0];
    base = DB[fb];
  }
  var t = TOOLS.find(function(x){ return x.id===tool; }) || TOOLS[0];

  var kwTags=[], kwTitle="";
  if (keyword && keyword.trim()) {
    var kw=keyword.trim();
    Object.keys(KW_MAP).forEach(function(jp){
      if(kw.indexOf(jp)>=0) KW_MAP[jp].forEach(function(en){ if(kwTags.indexOf(en)<0) kwTags.push(en); });
    });
    if(/[a-zA-Z]/.test(kw)) {
      kw.split(/[\s,　]+/).forEach(function(w){ if(w.length>1 && kwTags.indexOf(w.toLowerCase())<0) kwTags.push(w.toLowerCase()); });
    }
    kwTitle = kwTags.length>0 ? cap(kwTags[0]) : "";
  }

  var titles = base.t.map(function(tp,i){
    var title = (i===0 && kwTitle) ? kwTitle+" "+tp : tp;
    title += " "+t.tw;
    if(title.length>140) title=title.substring(0,137)+"...";
    return title;
  });

  var tags=[];
  kwTags.slice(0,3).forEach(function(x){ if(tags.indexOf(x)<0) tags.push(x); });
  base.tags.forEach(function(x){ if(tags.indexOf(x)<0) tags.push(x); });
  if(tags.indexOf(t.tg)<0) tags.push(t.tg);
  if(tags.indexOf("digital download")<0) tags.push("digital download");
  if(tags.indexOf("instant download")<0) tags.push("instant download");
  tags=tags.slice(0,13);

  return {titles:titles, tags:tags, seoScore:base.seo, competition:base.comp, searchVol:base.vol, trend:base.trend};
}

function cap(s){ return s ? s.charAt(0).toUpperCase()+s.slice(1) : ""; }

function copyText(text,id){
  if(navigator.clipboard) navigator.clipboard.writeText(text.replace(/\\n/g,"\n"));
  var el=document.getElementById(id); if(!el) return;
  var orig=el.innerHTML;
  el.innerHTML="✓ コピー済"; el.style.background="rgba(180,240,200,0.6)"; el.style.color="#208040";
  setTimeout(function(){ el.innerHTML=orig; el.style.background=""; el.style.color=""; },1800);
}

function render(){
  var app=document.getElementById("app"); if(!app) return;
  if(S.result) app.innerHTML=rResult();
  else if(S.step===0) app.innerHTML=r0();
  else if(S.step===1) app.innerHTML=r1();
  else if(S.step===2) app.innerHTML=r2();
  else app.innerHTML=r3();
  bind();
}

function bind(){
  document.querySelectorAll('[data-a]').forEach(function(el){
    el.addEventListener('click',function(){
      var a=this.getAttribute('data-a'),v=this.getAttribute('data-v');
      if(a==='scene')   set({scene:v,product:'',tool:''});
      if(a==='product') set({product:v,tool:''});
      if(a==='tool')    set({tool:v});
      if(a==='hint'){
        var cur=document.getElementById('kw');
        var val=cur?cur.value:S.keyword;
        val=val?(val+' '+v).trim():v;
        S.keyword=val; render();
      }
    });
  });
  var kw=document.getElementById('kw');
  if(kw) kw.addEventListener('input',function(){ S.keyword=this.value; });

  var ids={
    'n0':function(){ if(S.scene) set({step:1}); },
    'n1':function(){ if(S.product) set({step:2}); },
    'n2':function(){ if(S.tool) set({step:3}); },
    'b1':function(){ set({step:0,product:'',tool:''}); },
    'b2':function(){ set({step:1,tool:''}); },
    'b3':function(){ set({step:2}); },
    'gen':function(){
      var k=document.getElementById('kw');
      var kv=k?k.value:S.keyword;
      set({keyword:kv,result:buildResult(S.scene,S.product,S.tool,kv)});
    },
    'rst':function(){ set({step:0,scene:'',product:'',tool:'',keyword:'',result:null}); },
  };
  Object.keys(ids).forEach(function(id){
    var el=document.getElementById(id);
    if(el) el.addEventListener('click',ids[id]);
  });
}

render();
</script>
</body>
</html>
